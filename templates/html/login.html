<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Логин</title>

    <link rel="stylesheet" href="../static/css/base.css" />
    <link rel="stylesheet" href="../static/css/registration.css" />
  </head>
  <body>
    <main class="registration-container">
      <h1>Логин</h1>
      <div class="registration-card">
        <form class="registration-form">
          <label for="name">Имя пользователя (необязательно)</label>
          <input class="user-name" type="text" placeholder="Введите имя пользователя"/>
          <label for="email">Почта</label>
          <input class="user-email" type="email" placeholder="Введите почту"/>
          <label for="password">Пароль</label>
          <input class="user-password" type="password" placeholder="Введите пароль"/>
          <button class="registration-button base-button">Продолжить</button>
        </form>
        <div class="account-link">
            <span>Уже есть аккаунт? <b><a class="login-link" href="registration.html">Войти</a></b></span>
            <b><a class="login-link" href="">Забыли пароль?</a></b>
        </div>
      </div>
    </main>
  </body>
</html>
