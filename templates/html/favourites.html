    <header class="header">
      <div class="header__logo">
        <a href="#">
          <img
            class="logotype"
            src="../static/media/filmix-logo.png"
            alt="Логотип"
          />
        </a>
      </div>
      <nav class="header__nav">
        <ul class="nav-list">
          <li><a href="#">Главная</a></li>
          <li><a href="#">Избранное</a></li>
          <li><a href="#">Фильмы</a></li>
          <li><a href="#">Логин</a></li>
        </ul>
      </nav>
    </header>

    <section class="filters-section">
      <form id="movie-filters-form" class="filters-form">
        <div class="filters-block filters-block--search">
          <h2 class="filters-block__title">Поиск</h2>
          <div class="search-wrapper">
            <input
              type="text"
              name="query"
              class="search-input"
              placeholder="Введите название фильма"
              autocomplete="off"
            />
            <button type="submit" class="btn btn--primary base-button">
              Искать
            </button>
          </div>
        </div>

        <div class="filters-block filters-block--filter">
          <h2 class="filters-block__title">Фильтр</h2>

          <div class="filter-fields">
            <div class="filter-field">
              <input
                type="text"
                name="genres"
                class="filter-input"
                placeholder="Жанры"
                readonly
                data-filter="genre"
              />
            </div>

            <div class="filter-field">
              <input
                type="text"
                name="years"
                class="filter-input"
                placeholder="Годы"
                readonly
                data-filter="year"
              />
            </div>

            <div class="filter-field">
              <input
                input
                type="text"
                name="countries"
                class="filter-input"
                placeholder="Страны"
                readonly
                data-filter="country"
              />
            </div>
          </div>
        </div>

        <div class="filters-block filters-block--bottom">
          <div class="sort-wrapper">
            <h2 class="filters-block__title">Сортировка</h2>

            <div class="custom-select-wrapper">
              <select name="sort" class="sort-select" id="sort-select">
                <option value="" disabled selected>Сортировать по</option>
                <option value="title-asc">Название ⬇</option>
                <option value="title-desc">Название ⬆</option>
                <option value="year-desc">Год ⬇</option>
                <option value="year-asc">Год ⬆</option>
                <option value="rating-desc">Рейтинг ⬇</option>
                <option value="rating-asc">Рейтинг ⬆</option>
              </select>
              <div class="custom-select-arrow"></div>
            </div>
          </div>

          <button type="reset" class="btn btn--reset base-button">
            Сбросить фильтр
          </button>
        </div>
      </form>
    </section>

    <section class="all-movies">
      <h2>Все Фильмы</h2>
      <div class="all-movies__container film-container">
        <article class="all-movies__card film-card">
          <img src="../static/media/cardImage.jpg" alt="cardImage" />
          <div class="all-movies__description film-description">
            <h4 class="all-movies__title-film film-title">Uncharted</h4>
            <div class="all-movies__date-category year-genre">
              <p class="all-movies__date film-year">2025</p>
              <p class="all-movies__category film-genre">Фантастика</p>
            </div>
            <button class="all-movies__btn base-button film-btn">
              Подробнее
            </button>
          </div>
        </article>
      </div>
    </section>
